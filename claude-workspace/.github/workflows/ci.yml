name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --quiet ruff
      - run: ruff check .

  type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --quiet .[dev]
      - run: mypy app --ignore-missing-imports

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: cms
          POSTGRES_USER: cms
          POSTGRES_PASSWORD: cms
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cms -d cms"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://cms:cms@localhost:5432/cms
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-test-secret-key-for-testing-only
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --quiet ".[dev]"
      - name: Apply database migrations
        run: alembic upgrade head
      - name: Bootstrap cms_app role (idempotent)
        run: |
          psql "$DATABASE_URL_PSQL" -c "
            DO \$\$
            BEGIN
              IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'cms_app') THEN
                CREATE ROLE cms_app LOGIN PASSWORD 'cms_app' NOSUPERUSER NOBYPASSRLS;
              END IF;
            END
            \$\$;
            GRANT CONNECT ON DATABASE cms TO cms_app;
            GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO cms_app;
            ALTER DEFAULT PRIVILEGES IN SCHEMA public
              GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO cms_app;
          "
        env:
          DATABASE_URL_PSQL: postgresql://cms:cms@localhost:5432/cms
      - run: pytest -q --tb=short

  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: clinic-cms-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
